# Site settings
title: Informatics Club
description: >-
  The Informatics Club fosters a community for UAB students and trainees
  interested in informatics through professional development, social activities,
  and community service.
author: Informatics Club
email: informaticsclub@uab.edu
url: "https://informaticsclub.github.io"
baseurl: ""

# Remote theme
remote_theme: sdhutchins/jekyll-club-website

# Logo
logo: /assets/img/informatics-club-logo-white-detailed.png

# Hero background image (optional)
hero_image: ""

# Navigation links
nav_links:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: Events
    url: /events/
  - title: Resources
    url: /resources/
  - title: Executive Board
    url: /executive-board/
  - title: About
    url: /about/
  - title: Contact
    url: /contact/

# Theme colors (Informatics Club greens)
font: "Inter"

colors:
  primary: "#144B39"
  accent: "#88C408"
  dark: "#033319"

# License for blog posts
license: "CC BY 4.0"

# GitHub repository
github_repo: "informaticsclub/informaticsclub.github.io"

# Social media links
social:
  email: informaticsclub@uab.edu
  instagram: informatics_club_uab
  twitter: UAB_IC
  github: informaticsclub
  youtube: "@informatics_club_uab"
  engage: "https://uab.campuslabs.com/engage/organization/informatics-club"

# Build settings
timezone: America/Chicago
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 6
paginate_path: "/blog/page:num/"

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - CHANGELOG.md
  - vendor/
  - node_modules/
  - .ruby-version
